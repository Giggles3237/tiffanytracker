name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create config.js from secret
        run: |
          cat > config.js <<'EOF'
          const FIREBASE_CONFIG = {
              apiKey: "${{ secrets.FIREBASE_API_KEY }}",
              authDomain: "tiffanytracker.firebaseapp.com",
              projectId: "tiffanytracker",
              storageBucket: "tiffanytracker.firebasestorage.app",
              messagingSenderId: "699191128725",
              appId: "1:699191128725:web:5e3c77a87f7abb0f7b219c",
              measurementId: "G-288F43RRNJ"
          };
          EOF
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TIFFANYTRACKER }}
          projectId: tiffanytracker
